name: Deploy React Client to Azure
on:
  push:
    branches: [ "Sarah" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and Build
        working-directory: ./spark2scale_.client
        run: |
          npm install
          npm run build
          
          # --- THE FIX STARTS HERE ---
          # Create a clean folder for deployment
          mkdir -p ../deploy_out
          
          # 1. Copy the inner project files (where server.js lives) to the ROOT of deploy_out
          # This brings server.js out of the subfolder
          cp -r .next/standalone/spark2scale_.client/. ../deploy_out/
          
          # 2. Copy the shared node_modules to the ROOT
          cp -r .next/standalone/node_modules ../deploy_out/
          
          # 3. Manually put static assets where Next.js expects them (at the root)
          mkdir -p ../deploy_out/.next/static
          mkdir -p ../deploy_out/public
          cp -r .next/static/. ../deploy_out/.next/static/
          cp -r public/. ../deploy_out/public/ || true
          # ---------------------------

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'spark2scale-client'
          publish-profile: ${{ secrets.AZURE_CLIENT_PUBLISH_PROFILE }}
          # Deploy the clean, flattened folder
          package: ./deploy_out
