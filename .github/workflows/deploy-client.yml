name: Deploy React Client to Azure
on:
  push:
    branches: [ "Sarah" ] # Handles both case possibilities

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and Build
        working-directory: ./spark2scale_.client
        run: |
          npm install
          npm run build
          
          # Create a fresh deployment directory at the runner root
          mkdir -p ../deploy_out
          
          # Copy the contents of standalone into that root-level folder
          cp -r .next/standalone/. ../deploy_out/
          
          # Manually move static assets to the correct relative path
          mkdir -p ../deploy_out/.next/static
          cp -r .next/static/. ../deploy_out/.next/static/
          cp -r public/. ../deploy_out/public/ || true

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'spark2scale-client'
          publish-profile: ${{ secrets.AZURE_CLIENT_PUBLISH_PROFILE }}
          # Deploy from the clean folder we just created
          package: ./deploy_out
