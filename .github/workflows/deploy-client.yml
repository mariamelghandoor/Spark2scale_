name: Deploy React Client to Azure
on:
  push:
    branches: [ "Sarah" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and Build
        working-directory: ./spark2scale_.client
        run: |
          npm install
          npm run build
          
          # --- THE "SMART FIND" FIX ---
          echo "🔍 Searching for server.js..."
          
          # 1. Find the exact folder containing server.js
          # This works regardless of folder names (spark2scale_.client vs Spark2Scale_.Client)
          SERVER_DIR=$(find .next/standalone -type f -name "server.js" -exec dirname {} \; | head -n 1)
          
          echo "✅ Found app in: $SERVER_DIR"
          
          # 2. Create the clean output folder
          mkdir -p ../deploy_out
          
          # 3. Copy the APP files (flattening them to root)
          cp -r "$SERVER_DIR"/. ../deploy_out/
          
          # 4. If node_modules exists in the standalone root (shared libs), copy it too
          if [ "$SERVER_DIR" != ".next/standalone" ] && [ -d ".next/standalone/node_modules" ]; then
             echo "📦 Copying shared node_modules..."
             cp -r .next/standalone/node_modules ../deploy_out/
          fi
          
          # 5. Manually copy static assets to the correct relative locations
          mkdir -p ../deploy_out/.next/static
          mkdir -p ../deploy_out/public
          cp -r .next/static/. ../deploy_out/.next/static/
          cp -r public/. ../deploy_out/public/ || true
          
          # Debug: Show us what we built (optional, for logs)
          ls -la ../deploy_out
          # ---------------------------

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'spark2scale-client'
          publish-profile: ${{ secrets.AZURE_CLIENT_PUBLISH_PROFILE }}
          # Deploy the clean, flattened folder we just made
          package: ./deploy_out
